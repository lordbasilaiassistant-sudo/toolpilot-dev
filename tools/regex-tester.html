<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester — ToolPilot.dev</title>
  <meta name="description" content="Free online regex tester with real-time match highlighting, capture groups, and flags. Test JavaScript regular expressions instantly.">
  <link rel="canonical" href="https://lordbasilaiassistant-sudo.github.io/toolpilot-dev/tools/regex-tester.html">
  <meta property="og:title" content="Regex Tester — ToolPilot.dev">
  <meta property="og:description" content="Free regex tester with real-time highlighting and capture groups.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<nav>
  <div class="container">
    <a href="../index.html" class="nav-logo"><span>&gt;_</span> ToolPilot</a>
    <button class="nav-hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    <div class="nav-links">
      <a href="../index.html#tools">Tools</a>
      <a href="../index.html#premium">Premium</a>
    </div>
  </div>
</nav>

<section class="tool-page">
  <div class="container">
    <h1>Regex Tester</h1>
    <p class="tool-desc">Test JavaScript regular expressions with real-time match highlighting.</p>
    <div class="tool-area">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
        <label style="margin:0;flex-shrink:0;">Pattern:</label>
        <input type="text" id="regex-pattern" placeholder="e.g. \b\w+@\w+\.\w+\b" style="flex:1;min-width:200px;" oninput="testRegex()">
        <label style="margin:0;flex-shrink:0;">Flags:</label>
        <input type="text" id="regex-flags" value="gmi" style="width:60px;" oninput="testRegex()">
      </div>
      <label for="regex-input">Test String</label>
      <textarea id="regex-input" placeholder="Enter text to test against your regex..." oninput="testRegex()"></textarea>
      <div style="margin-top:16px;">
        <label>Matches</label>
        <div id="regex-output" class="tool-output">Matches will appear here...</div>
      </div>
      <div style="margin-top:16px;">
        <label>Highlighted Text</label>
        <div id="regex-highlight" class="tool-output" style="white-space:pre-wrap;"></div>
      </div>
    </div>
  </div>
</section>

<footer><div class="container"><p>&copy; 2026 <a href="../index.html">ToolPilot.dev</a></p></div></footer>

<script>
function testRegex() {
  const pattern = document.getElementById('regex-pattern').value;
  const flags = document.getElementById('regex-flags').value;
  const input = document.getElementById('regex-input').value;
  const out = document.getElementById('regex-output');
  const highlight = document.getElementById('regex-highlight');

  if (!pattern || !input) {
    out.textContent = 'Enter a pattern and test string...';
    out.className = 'tool-output';
    highlight.innerHTML = escapeHtml(input);
    return;
  }

  try {
    const regex = new RegExp(pattern, flags);
    const matches = [];
    let m;

    if (flags.includes('g')) {
      while ((m = regex.exec(input)) !== null) {
        matches.push({ full: m[0], index: m.index, groups: m.slice(1) });
        if (m[0].length === 0) regex.lastIndex++;
      }
    } else {
      m = regex.exec(input);
      if (m) matches.push({ full: m[0], index: m.index, groups: m.slice(1) });
    }

    if (matches.length === 0) {
      out.textContent = 'No matches found.';
      out.className = 'tool-output error';
      highlight.innerHTML = escapeHtml(input);
      return;
    }

    let info = `${matches.length} match${matches.length > 1 ? 'es' : ''} found:\n\n`;
    matches.forEach((match, i) => {
      info += `Match ${i + 1}: "${match.full}" at index ${match.index}\n`;
      if (match.groups.length > 0) {
        match.groups.forEach((g, j) => {
          info += `  Group ${j + 1}: "${g || ''}"\n`;
        });
      }
    });
    out.textContent = info;
    out.className = 'tool-output success';

    // Highlight
    const regex2 = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g');
    highlight.innerHTML = escapeHtml(input).replace(
      new RegExp(pattern, flags.includes('g') ? flags : flags + 'g'),
      match => `<span class="match-highlight">${escapeHtml(match)}</span>`
    );
    // Re-do highlight properly
    let html = '';
    let lastIndex = 0;
    const regex3 = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g');
    let m3;
    while ((m3 = regex3.exec(input)) !== null) {
      html += escapeHtml(input.slice(lastIndex, m3.index));
      html += '<span class="match-highlight">' + escapeHtml(m3[0]) + '</span>';
      lastIndex = m3.index + m3[0].length;
      if (m3[0].length === 0) { regex3.lastIndex++; lastIndex++; }
    }
    html += escapeHtml(input.slice(lastIndex));
    highlight.innerHTML = html;

  } catch (e) {
    out.textContent = 'Regex error: ' + e.message;
    out.className = 'tool-output error';
    highlight.innerHTML = escapeHtml(input);
  }
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
