<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word &amp; Character Counter — ToolPilot.dev</title>
  <meta name="description" content="Free online word counter, character counter, sentence counter. See reading time, paragraph count, and more. No signup required.">
  <link rel="canonical" href="https://drlor.github.io/toolpilot-dev/tools/word-counter.html">
  <meta property="og:title" content="Word & Character Counter — ToolPilot.dev">
  <meta property="og:description" content="Free word and character counter with reading time estimates.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<nav>
  <div class="container">
    <a href="../index.html" class="nav-logo"><span>&gt;_</span> ToolPilot</a>
    <button class="nav-hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    <div class="nav-links">
      <a href="../index.html#tools">Tools</a>
      <a href="../index.html#premium">Premium</a>
    </div>
  </div>
</nav>

<section class="tool-page">
  <div class="container">
    <h1>Word &amp; Character Counter</h1>
    <p class="tool-desc">Type or paste text to see word count, character count, sentences, paragraphs, and reading time.</p>
    <div class="tool-area">
      <label for="wc-input">Your Text</label>
      <textarea id="wc-input" placeholder="Start typing or paste your text here..." oninput="analyze()"></textarea>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:20px;">
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-words">0</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">Words</div>
        </div>
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-chars">0</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">Characters</div>
        </div>
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-chars-ns">0</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">No Spaces</div>
        </div>
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-sentences">0</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">Sentences</div>
        </div>
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-paragraphs">0</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">Paragraphs</div>
        </div>
        <div class="tool-output" style="text-align:center;min-height:auto;padding:16px;">
          <div style="font-size:1.6rem;font-weight:700;color:var(--accent);" id="s-reading">0s</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);">Reading Time</div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer><div class="container"><p>&copy; 2026 <a href="../index.html">ToolPilot.dev</a></p></div></footer>

<script>
function analyze() {
  const text = document.getElementById('wc-input').value;
  const trimmed = text.trim();

  const words = trimmed === '' ? 0 : trimmed.split(/\s+/).length;
  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const sentences = trimmed === '' ? 0 : (trimmed.match(/[.!?]+/g) || []).length || (trimmed.length > 0 ? 1 : 0);
  const paragraphs = trimmed === '' ? 0 : trimmed.split(/\n\s*\n/).filter(p => p.trim()).length || (trimmed.length > 0 ? 1 : 0);
  const readingMinutes = words / 238;
  let readingStr;
  if (readingMinutes < 1) {
    readingStr = Math.ceil(readingMinutes * 60) + 's';
  } else {
    readingStr = Math.ceil(readingMinutes) + 'min';
  }

  document.getElementById('s-words').textContent = words;
  document.getElementById('s-chars').textContent = chars;
  document.getElementById('s-chars-ns').textContent = charsNoSpace;
  document.getElementById('s-sentences').textContent = sentences;
  document.getElementById('s-paragraphs').textContent = paragraphs;
  document.getElementById('s-reading').textContent = readingStr;
}
</script>
</body>
</html>
