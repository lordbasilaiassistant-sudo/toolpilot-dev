<div class="tool-container">
  <div class="tool-header">
    <h1>Color Palette Generator</h1>
    <p>Generate beautiful color palettes. Press spacebar or click generate. Click any swatch to copy.</p>
  </div>

  <div class="tool-panel">
    <label>Settings</label>
    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
      <div>
        <span style="font-size:0.85rem;color:var(--text-muted)">Base color:</span>
        <input type="color" id="base-color" value="#10B981" style="width:50px;height:36px;border:none;cursor:pointer;background:transparent">
      </div>
      <div>
        <span style="font-size:0.85rem;color:var(--text-muted)">Harmony:</span>
        <select id="harmony" style="width:auto;padding:0.4rem 0.75rem">
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
          <option value="split">Split Complementary</option>
          <option value="monochrome">Monochrome</option>
          <option value="random">Random</option>
        </select>
      </div>
      <div>
        <span style="font-size:0.85rem;color:var(--text-muted)">Count:</span>
        <input type="number" id="color-count" value="5" min="3" max="12" style="width:60px;display:inline-block">
      </div>
    </div>
  </div>

  <div class="tool-actions">
    <button class="btn btn-primary" onclick="generatePalette()">Generate Palette</button>
    <button class="btn btn-outline" onclick="copyAllColors()">Copy All (Hex)</button>
    <button class="btn btn-outline" onclick="copyCSS()">Copy as CSS</button>
  </div>

  <div class="tool-panel">
    <label>Palette <span style="font-weight:400;color:var(--text-muted)">(click to copy)</span></label>
    <div id="palette" class="palette-grid"></div>
  </div>

  <div class="tool-panel">
    <label>CSS Variables</label>
    <div id="css-output" class="output-area" style="min-height:60px"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer class="footer">
  <p>&copy; 2026 ToolPilot &middot; <a href="../index.html">Back to all tools</a></p>
</footer>

<script>
let currentPalette = [];

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max === r) h = ((g-b)/d + (g<b?6:0))/6;
    else if (max === g) h = ((b-r)/d+2)/6;
    else h = ((r-g)/d+4)/6;
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h, s, l) {
  h = ((h%360)+360)%360;
  s = Math.max(0, Math.min(100, s))/100;
  l = Math.max(0, Math.min(100, l))/100;
  const a = s * Math.min(l, 1-l);
  const f = n => {
    const k = (n + h/30) % 12;
    const c = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
    return Math.round(255*c).toString(16).padStart(2,'0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function generatePalette() {
  const base = document.getElementById('base-color').value;
  const harmony = document.getElementById('harmony').value;
  const count = Math.min(12, Math.max(3, parseInt(document.getElementById('color-count').value) || 5));
  const [h, s, l] = hexToHsl(base);
  let colors = [];

  switch (harmony) {
    case 'analogous':
      for (let i = 0; i < count; i++) {
        const offset = (i - Math.floor(count/2)) * 25;
        colors.push(hslToHex(h + offset, s, l));
      }
      break;
    case 'complementary':
      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        colors.push(hslToHex(h + t * 180, s, l + (i % 2 === 0 ? 0 : -10)));
      }
      break;
    case 'triadic':
      for (let i = 0; i < count; i++) {
        colors.push(hslToHex(h + (i * 120 / Math.ceil(count/3)), s, l - 10 + (i % 3) * 10));
      }
      break;
    case 'split':
      for (let i = 0; i < count; i++) {
        const angles = [0, 150, 210];
        colors.push(hslToHex(h + angles[i % 3] + Math.floor(i/3)*15, s, l));
      }
      break;
    case 'monochrome':
      for (let i = 0; i < count; i++) {
        const lightness = 20 + (60 / (count - 1)) * i;
        colors.push(hslToHex(h, s, lightness));
      }
      break;
    case 'random':
      for (let i = 0; i < count; i++) {
        colors.push('#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'));
      }
      break;
  }

  currentPalette = colors;
  renderPalette();
}

function renderPalette() {
  const container = document.getElementById('palette');
  const cssOut = document.getElementById('css-output');
  container.innerHTML = '';

  let css = ':root {\n';
  currentPalette.forEach((color, i) => {
    const [r, g, b] = hexToRgb(color);
    const [h, s, l] = hexToHsl(color);
    const lum = (0.299*r + 0.587*g + 0.114*b);
    const textColor = lum > 128 ? '#000' : '#fff';

    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.innerHTML = `
      <div class="swatch-color" style="background:${color};display:flex;align-items:center;justify-content:center;color:${textColor};font-weight:700;font-size:0.85rem">${color}</div>
      <div class="swatch-label">rgb(${r},${g},${b})<br>hsl(${h},${s}%,${l}%)</div>
    `;
    swatch.onclick = () => {
      navigator.clipboard.writeText(color);
      showToast('Copied ' + color);
    };
    container.appendChild(swatch);

    css += `  --color-${i + 1}: ${color}; /* rgb(${r},${g},${b}) */\n`;
  });
  css += '}';
  cssOut.textContent = css;
}

function copyAllColors() {
  if (!currentPalette.length) return;
  navigator.clipboard.writeText(currentPalette.join('\n'));
  showToast('All colors copied!');
}

function copyCSS() {
  const css = document.getElementById('css-output').textContent;
  if (!css) return;
  navigator.clipboard.writeText(css);
  showToast('CSS copied!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
    e.preventDefault();
    generatePalette();
  }
});

generatePalette();
</script>
</body>
</html>
