<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Free online color palette generator. Create harmonious color schemes with hex codes. Click to copy. No signup required.">
  <link rel="canonical" href="https://drlor.github.io/toolpilot-dev/tools/color-palette.html">
  <meta property="og:title" content="Color Palette Generator — ToolPilot.dev">
  <meta property="og:description" content="Free color palette generator. Create beautiful color schemes instantly.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

<body>

<nav>
  <div class="container">
    <a href="../index.html" class="nav-logo"><span>&gt;_</span> ToolPilot</a>
    <button class="nav-hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    <div class="nav-links">
      <a href="../index.html#tools">Tools</a>
      <a href="../index.html#premium">Premium</a>
    </div>
  </div>
</nav>

<section class="tool-page">
  <div class="container">
    <h1>Color Palette Generator</h1>
    <p class="tool-desc">Generate harmonious color palettes. Click a swatch to copy its hex code. Press spacebar to regenerate.</p>
    <div class="tool-area">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
        <label style="margin:0;">Mode:</label>
        <select id="palette-mode" style="background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-family:var(--font-sans);font-size:0.9rem;">
          <option value="random">Random</option>
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
          <option value="monochromatic">Monochromatic</option>
        </select>
        <label style="margin:0;">Colors:</label>
        <input type="number" id="palette-count" value="6" min="3" max="12" style="width:60px;">
        <button class="btn btn-primary" onclick="generatePalette()">Generate</button>
        <button class="btn btn-outline" onclick="copyPalette()">Copy All</button>
      </div>
      <div id="palette-grid" class="color-grid"></div>
      <div id="palette-codes" class="tool-output" style="margin-top:16px;min-height:auto;"></div>
    </div>
  </div>
</section>

<footer><div class="container"><p>&copy; 2026 <a href="../index.html">ToolPilot.dev</a></p></div></footer>

<script>
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const f = n => {
    const k = (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const c = l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generatePalette() {
  const mode = document.getElementById('palette-mode').value;
  const count = Math.min(12, Math.max(3, parseInt(document.getElementById('palette-count').value) || 6));
  let colors = [];
  const baseHue = randInt(0, 360);
  const baseSat = randInt(55, 85);
  const baseLit = randInt(45, 65);

  switch (mode) {
    case 'analogous':
      for (let i = 0; i < count; i++) {
        colors.push(hslToHex((baseHue + i * 30 - (count * 15)) % 360, baseSat + randInt(-10, 10), baseLit + randInt(-10, 10)));
      }
      break;
    case 'complementary':
      for (let i = 0; i < count; i++) {
        const hue = i % 2 === 0 ? baseHue : (baseHue + 180) % 360;
        colors.push(hslToHex(hue + randInt(-15, 15), baseSat + randInt(-10, 10), 35 + i * (40 / count)));
      }
      break;
    case 'triadic':
      for (let i = 0; i < count; i++) {
        const hue = (baseHue + (i % 3) * 120 + randInt(-10, 10)) % 360;
        colors.push(hslToHex(hue, baseSat + randInt(-10, 10), baseLit + randInt(-15, 15)));
      }
      break;
    case 'monochromatic':
      for (let i = 0; i < count; i++) {
        colors.push(hslToHex(baseHue, baseSat + randInt(-5, 5), 25 + i * (50 / count)));
      }
      break;
    default:
      for (let i = 0; i < count; i++) {
        colors.push(hslToHex(randInt(0, 360), randInt(50, 90), randInt(40, 70)));
      }
  }

  const grid = document.getElementById('palette-grid');
  grid.innerHTML = colors.map(c => {
    const lum = parseInt(c.slice(1, 3), 16) * 0.299 + parseInt(c.slice(3, 5), 16) * 0.587 + parseInt(c.slice(5, 7), 16) * 0.114;
    const textColor = lum > 140 ? '#000' : '#fff';
    return `<div class="color-swatch" style="background:${c};color:${textColor};" onclick="copySwatch('${c}')" title="Click to copy">${c}</div>`;
  }).join('');

  document.getElementById('palette-codes').textContent = colors.join('  ');
  window._currentPalette = colors;
}

function copySwatch(hex) {
  navigator.clipboard.writeText(hex);
  const el = document.createElement('div');
  el.className = 'copied'; el.textContent = 'Copied ' + hex;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function copyPalette() {
  if (window._currentPalette) {
    navigator.clipboard.writeText(window._currentPalette.join('\n'));
    const el = document.createElement('div');
    el.className = 'copied'; el.textContent = 'Copied all colors!';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    generatePalette();
  }
});

generatePalette();
</script>
</body>
</html>
